<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product — ShopFlow</title>
  <meta name="description" content="Premium product detail." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main class="container">
    <div class="breadcrumbs" id="crumbs"></div>
    <div class="product-detail" id="detail-root">
      <div class="spinner" style="grid-column:1/-1"></div>
    </div>

    <section class="section" style="padding-top:40px">
      <div class="section-head"><h2 class="section-title">You might also like</h2></div>
      <div class="product-grid" id="related-grid"></div>
    </section>

    <section class="section" id="detail-recent-section" style="padding-top:0">
      <div class="section-head"><h2 class="section-title">Recently viewed</h2></div>
      <div class="product-grid" id="detail-recent-grid"></div>
    </section>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script src="js/detail.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop all products — ShopFlow</title>
  <meta name="description" content="Browse our full catalog with search, filters, and sort." />
  <link rel="canonical" href="https://sonusharmafiles.github.io/ecommerce/products.html" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <meta property="og:title" content="Shop all products — ShopFlow" />
  <meta property="og:description" content="Browse our full catalog." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main id="main" class="container">
    <div class="breadcrumbs">
      <a href="index.html">Home</a><span class="sep">/</span><span>Shop</span>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:end;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="margin:0;font-size:32px;letter-spacing:-.02em">All products</h1>
        <p class="text-muted" id="catalog-count">Loading…</p>
      </div>
    </div>

    <div class="catalog">
      <aside class="filter-panel" id="filter-panel"><div class="spinner"></div></aside>
      <section>
        <div class="catalog-toolbar" id="catalog-toolbar"></div>
        <div class="product-grid" id="catalog-grid">
          <div class="spinner" style="grid-column:1/-1"></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </section>
    </div>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>

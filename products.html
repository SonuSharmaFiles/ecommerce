<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop — ShopFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-mark"></span> ShopFlow</a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?sort=newest">New</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-spacer"></div>
      <div class="nav-actions">
        <a class="icon-btn" href="cart.html" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count" hidden>0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumbs">
      <a href="index.html">Home</a><span class="sep">/</span><span>Shop</span>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:end;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <h1 style="margin:0;font-size:32px;letter-spacing:-.02em">All products</h1>
        <p class="text-muted" id="catalog-count">Loading…</p>
      </div>
    </div>

    <div class="catalog">
      <aside class="filter-panel" id="filter-panel">
        <div class="spinner"></div>
      </aside>

      <section>
        <div class="catalog-toolbar" id="catalog-toolbar"></div>
        <div class="product-grid" id="catalog-grid">
          <div class="spinner" style="grid-column:1/-1"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> ShopFlow. All rights reserved.</span>
        <span><a href="about.html">About</a> · <a href="contact.html">Contact</a></span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>

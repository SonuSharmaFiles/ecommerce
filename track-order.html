<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Track your order — ShopFlow</title>
  <meta name="description" content="Enter your order ID and email to track your order." />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main id="main" class="container content-page">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Track order</span></div>
    <h1>Track your order</h1>
    <p>Enter your order ID and email to check status.</p>

    <form class="form-card" id="track-form" style="max-width:520px;margin-top:24px">
      <div class="form-row full">
        <div>
          <label for="orderId">Order ID</label>
          <input class="input" id="orderId" name="orderId" placeholder="SF-ABC123" required />
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label for="trackEmail">Email</label>
          <input class="input" type="email" id="trackEmail" name="email" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Track order</button>
    </form>

    <div id="track-result" hidden style="margin-top:24px;max-width:720px"></div>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script src="js/track.js"></script>
</body>
</html>

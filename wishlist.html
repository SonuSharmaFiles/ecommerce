<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wishlist — ShopFlow</title>
  <meta name="robots" content="noindex" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main id="main" class="container">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Wishlist</span></div>
    <h1 style="margin:8px 0 24px;font-size:32px;letter-spacing:-.02em">Your wishlist</h1>

    <div id="wishlist-empty" class="empty-state" hidden>
      <h2>Your wishlist is empty</h2>
      <p>Save items you love. They'll be here when you come back.</p>
      <a class="btn btn-primary" href="products.html">Browse products</a>
    </div>

    <div class="product-grid" id="wishlist-grid">
      <div class="spinner" style="grid-column:1/-1"></div>
    </div>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script src="js/wishlist.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — ShopFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-mark"></span> ShopFlow</a>
      <div class="nav-spacer"></div>
      <a class="icon-btn" href="cart.html" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumbs">
      <a href="index.html">Home</a><span class="sep">/</span>
      <a href="cart.html">Cart</a><span class="sep">/</span>
      <span>Checkout</span>
    </div>
    <h1 style="margin:8px 0 24px;font-size:32px;letter-spacing:-.02em">Checkout</h1>

    <div class="checkout-layout" id="checkout-layout">
      <form id="checkout-form">
        <div class="form-card">
          <h3>Contact</h3>
          <div class="form-row full">
            <div>
              <label for="email">Email</label>
              <input class="input" type="email" id="email" name="email" required />
            </div>
          </div>
        </div>

        <div class="form-card">
          <h3>Shipping address</h3>
          <div class="form-row full">
            <div>
              <label for="fullName">Full name</label>
              <input class="input" id="fullName" name="fullName" required />
            </div>
          </div>
          <div class="form-row full">
            <div>
              <label for="line1">Address</label>
              <input class="input" id="line1" name="line1" required />
            </div>
          </div>
          <div class="form-row full">
            <div>
              <label for="line2">Apt, suite (optional)</label>
              <input class="input" id="line2" name="line2" />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="city">City</label>
              <input class="input" id="city" name="city" required />
            </div>
            <div>
              <label for="state">State / region</label>
              <input class="input" id="state" name="state" />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="postalCode">Postal code</label>
              <input class="input" id="postalCode" name="postalCode" required />
            </div>
            <div>
              <label for="country">Country</label>
              <select class="input" id="country" name="country" required>
                <option value="">Select…</option>
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
                <option>Australia</option>
                <option>India</option>
                <option>Nepal</option>
                <option>Other</option>
              </select>
            </div>
          </div>
        </div>

        <div class="form-card">
          <h3>Payment</h3>
          <div class="radio-row">
            <label><input type="radio" name="payment" value="card" checked/> Card</label>
            <label><input type="radio" name="payment" value="paypal"/> PayPal</label>
            <label><input type="radio" name="payment" value="cod"/> Cash on delivery</label>
          </div>
          <div class="form-row full" style="margin-top:16px">
            <div>
              <label for="cardNumber">Card number</label>
              <input class="input" id="cardNumber" name="cardNumber" placeholder="4242 4242 4242 4242" />
            </div>
          </div>
          <div class="form-row">
            <div>
              <label for="cardExpiry">Expiry</label>
              <input class="input" id="cardExpiry" name="cardExpiry" placeholder="MM/YY" />
            </div>
            <div>
              <label for="cardCvc">CVC</label>
              <input class="input" id="cardCvc" name="cardCvc" placeholder="123" />
            </div>
          </div>
          <p class="text-muted" style="font-size:12px;margin-top:8px">
            This is a demo storefront — no payment is actually charged.
          </p>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">Place order</button>
      </form>

      <aside class="cart-summary" id="checkout-summary"></aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> ShopFlow. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>

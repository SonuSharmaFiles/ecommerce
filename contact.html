<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — ShopFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-mark"></span> ShopFlow</a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?sort=newest">New</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-spacer"></div>
      <a class="icon-btn" href="cart.html" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container" style="max-width:760px;padding:40px 20px">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Contact</span></div>
    <h1 style="font-size:40px;letter-spacing:-.02em;margin:8px 0 16px">Get in touch</h1>
    <p class="text-muted" style="font-size:18px;margin-bottom:32px">
      We typically reply within a few hours. Email is the fastest path.
    </p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px">
      <div class="trust-item">
        <div><strong>support@shopflow.io</strong><span>Customer support</span></div>
      </div>
      <div class="trust-item">
        <div><strong>+1 (555) 010-0123</strong><span>Mon–Fri 9–6 ET</span></div>
      </div>
    </div>

    <form class="form-card" id="contact-form" onsubmit="event.preventDefault(); toast('Message sent. We\\'ll be in touch.'); this.reset();">
      <h3>Send us a message</h3>
      <div class="form-row">
        <div>
          <label for="cf-name">Name</label>
          <input class="input" id="cf-name" required />
        </div>
        <div>
          <label for="cf-email">Email</label>
          <input class="input" type="email" id="cf-email" required />
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label for="cf-subject">Subject</label>
          <input class="input" id="cf-subject" required />
        </div>
      </div>
      <div class="form-row full">
        <div>
          <label for="cf-message">Message</label>
          <textarea class="input" id="cf-message" rows="5" required></textarea>
        </div>
      </div>
      <button type="submit" class="btn btn-primary">Send message</button>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> ShopFlow. All rights reserved.</span>
      </div>
    </div>
  </footer>
  <script src="js/app.js"></script>
</body>
</html>

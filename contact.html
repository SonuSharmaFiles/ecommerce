<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — ShopFlow</title>
  <meta name="description" content="Get in touch with ShopFlow support." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Contact — ShopFlow" />
  <meta property="og:description" content="Get in touch with ShopFlow support." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact — ShopFlow" />
  <meta name="twitter:description" content="Get in touch with ShopFlow support." />
  <link rel="canonical" href="https://sonusharmafiles.github.io/ecommerce/contact.html" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main id="main" class="container content-page">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Contact</span></div>
    <h1>Get in touch</h1>
    <p style="font-size:18px">We typically reply within a few hours. Email is the fastest path.</p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:32px 0">
      <div class="trust-item">
        <div><strong>support@shopflow.io</strong><span>Customer support</span></div>
      </div>
      <div class="trust-item">
        <div><strong>+1 (555) 010-0123</strong><span>Mon–Fri 9–6 ET</span></div>
      </div>
    </div>

    <form class="form-card" id="contact-form" onsubmit="event.preventDefault(); toast('Message sent. We\\'ll be in touch.'); this.reset();">
      <h3>Send us a message</h3>
      <div class="form-row">
        <div><label for="cf-name">Name</label><input class="input" id="cf-name" required /></div>
        <div><label for="cf-email">Email</label><input class="input" type="email" id="cf-email" required /></div>
      </div>
      <div class="form-row full">
        <div><label for="cf-subject">Subject</label><input class="input" id="cf-subject" required /></div>
      </div>
      <div class="form-row full">
        <div><label for="cf-message">Message</label><textarea class="input" id="cf-message" rows="5" required></textarea></div>
      </div>
      <button type="submit" class="btn btn-primary">Send message</button>
    </form>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
</body>
</html>

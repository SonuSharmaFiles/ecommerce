<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — ShopFlow</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main class="container">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Cart</span></div>
    <h1 style="margin:8px 0 24px;font-size:32px;letter-spacing:-.02em">Your cart</h1>

    <div id="cart-empty" class="empty-state" hidden>
      <h2>Your cart is empty</h2>
      <p>Discover something new.</p>
      <a class="btn btn-primary" href="products.html">Browse products</a>
    </div>

    <div class="cart-layout" id="cart-layout">
      <div class="cart-items" id="cart-items"></div>
      <aside class="cart-summary">
        <h3 style="margin:0 0 12px">Summary</h3>
        <div class="free-ship-bar" id="free-ship-bar"></div>
        <div class="summary-row"><span class="muted">Subtotal</span><span id="sum-subtotal">$0.00</span></div>
        <div class="summary-row" id="sum-discount-row" style="display:none;color:var(--success)"><span>Discount</span><span id="sum-discount">$0.00</span></div>
        <div class="summary-row"><span class="muted">Shipping</span><span id="sum-shipping">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="sum-total">$0.00</span></div>

        <div id="promo-box"></div>

        <a href="checkout.html" class="btn btn-primary btn-lg btn-block" style="margin-top:8px">Checkout</a>
        <a href="products.html" class="btn btn-ghost btn-block" style="margin-top:8px">Continue shopping</a>

        <div class="checkout-trust">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>Secure SSL checkout</span>
        </div>
      </aside>
    </div>

    <section class="section" id="upsell-section">
      <div class="section-head"><h2 class="section-title">You might also like</h2></div>
      <div class="product-grid" id="upsell-grid"></div>
    </section>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>

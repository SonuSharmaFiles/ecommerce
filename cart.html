<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — ShopFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-mark"></span> ShopFlow</a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="products.html?sort=newest">New</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-spacer"></div>
      <div class="nav-actions">
        <a class="icon-btn" href="cart.html" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="cart-count" hidden>0</span>
        </a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="breadcrumbs"><a href="index.html">Home</a><span class="sep">/</span><span>Cart</span></div>
    <h1 style="margin:8px 0 24px;font-size:32px;letter-spacing:-.02em">Your cart</h1>

    <div id="cart-empty" class="empty-state" hidden>
      <h2>Your cart is empty</h2>
      <p>Discover something new.</p>
      <a class="btn btn-primary" href="products.html">Browse products</a>
    </div>

    <div class="cart-layout" id="cart-layout">
      <div class="cart-items" id="cart-items"></div>
      <aside class="cart-summary">
        <h3 style="margin:0 0 12px">Summary</h3>
        <div class="summary-row"><span class="muted">Subtotal</span><span id="sum-subtotal">$0.00</span></div>
        <div class="summary-row"><span class="muted">Shipping</span><span id="sum-shipping">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="sum-total">$0.00</span></div>
        <p class="text-muted" id="free-ship-note" style="font-size:12px;margin:8px 0 16px"></p>
        <a href="checkout.html" class="btn btn-primary btn-lg btn-block">Checkout</a>
        <a href="products.html" class="btn btn-ghost btn-block" style="margin-top:8px">Continue shopping</a>
      </aside>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> ShopFlow. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>

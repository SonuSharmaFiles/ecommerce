<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order confirmed — ShopFlow</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-mark"></span> ShopFlow</a>
      <div class="nav-spacer"></div>
      <a class="icon-btn" href="cart.html" aria-label="Cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span class="cart-count" hidden>0</span>
      </a>
    </div>
  </header>

  <main class="container" style="text-align:center;padding:80px 20px">
    <div style="width:80px;height:80px;border-radius:999px;background:#ecfdf5;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 style="font-size:32px;letter-spacing:-.02em;margin:0 0 8px">Thank you for your order!</h1>
    <p class="text-muted" style="margin:0 0 24px" id="thanks-msg">We've sent you a confirmation email with all the details.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="products.html" class="btn btn-primary">Keep shopping</a>
      <a href="index.html" class="btn btn-outline">Go to homepage</a>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom">
        <span>© <span data-year></span> ShopFlow. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script>
    const id = new URLSearchParams(location.search).get("id");
    if (id) {
      document.getElementById("thanks-msg").innerHTML =
        `Order <strong>#${id}</strong> confirmed. We've sent a confirmation email with all the details.`;
    }
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order confirmed — ShopFlow</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f172a'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="layout-header"></div>

  <main class="container" style="text-align:center;padding:80px 20px">
    <div style="width:80px;height:80px;border-radius:999px;background:#ecfdf5;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 style="font-size:32px;letter-spacing:-.02em;margin:0 0 8px">Thank you for your order!</h1>
    <p class="text-muted" style="margin:0 0 8px" id="thanks-msg">We've sent you a confirmation email with all the details.</p>
    <p class="text-muted" style="font-size:13px;margin:0 0 24px">Estimated delivery in 3–5 business days.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="track-order.html" class="btn btn-primary">Track my order</a>
      <a href="products.html" class="btn btn-outline">Keep shopping</a>
    </div>
  </main>

  <div id="layout-footer"></div>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const id = new URLSearchParams(location.search).get("id");
      if (id) {
        document.getElementById("thanks-msg").innerHTML =
          `Order <strong>#${id}</strong> confirmed. We've sent a confirmation email with all the details.`;
      }
    });
  </script>
</body>
</html>
